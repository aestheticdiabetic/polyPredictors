<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Whale Analysis — Polymarket Whale Copier</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <style>
    /* ── Page-specific styles ─────────────────────────────────────────── */

    .nav-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--text-secondary);
      font-size: 0.82rem;
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      transition: color var(--transition), border-color var(--transition);
      cursor: pointer;
      background: none;
    }
    .nav-back:hover { color: var(--text-primary); border-color: var(--accent); text-decoration: none; }

    /* Summary row — clickable to expand */
    tr.whale-summary-row { cursor: pointer; user-select: none; }
    tr.whale-summary-row:hover td { background: var(--bg-card-hover); }
    tr.whale-summary-row td:first-child::before {
      content: '▶';
      display: inline-block;
      margin-right: 6px;
      font-size: 0.65rem;
      color: var(--text-muted);
      transition: transform var(--transition);
    }
    tr.whale-summary-row.expanded td:first-child::before { transform: rotate(90deg); }

    /* Expanded detail panel */
    tr.whale-detail-row td { padding: 0 !important; border-top: none !important; }
    .whale-detail-panel {
      background: var(--bg-primary);
      border-bottom: 2px solid var(--border);
      padding: 20px 24px;
      display: none;
    }
    tr.whale-detail-row.open .whale-detail-panel { display: block; }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    @media (max-width: 900px) { .detail-grid { grid-template-columns: 1fr; } }

    .detail-section-title {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 10px;
    }

    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    .detail-table th {
      text-align: left;
      padding: 5px 10px;
      color: var(--text-muted);
      font-weight: 500;
      border-bottom: 1px solid var(--border);
      font-size: 0.72rem;
    }
    .detail-table td { padding: 6px 10px; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .detail-table tr:last-child td { border-bottom: none; }
    .detail-table tr:hover td { background: var(--bg-card-hover); }

    /* Filter panel */
    .filter-panel {
      margin-top: 20px;
      padding-top: 18px;
      border-top: 1px solid var(--border);
    }
    .filter-panel-title {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 12px;
    }
    .filter-groups {
      display: flex;
      gap: 32px;
      flex-wrap: wrap;
    }
    .filter-group-label {
      font-size: 0.72rem;
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }
    .filter-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .filter-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      font-size: 0.78rem;
      color: var(--text-primary);
      cursor: pointer;
      transition: border-color var(--transition), background var(--transition);
      user-select: none;
    }
    .filter-chip input[type="checkbox"] { accent-color: var(--accent); cursor: pointer; }
    .filter-chip:hover { border-color: var(--accent); }
    .filter-chip.disabled-chip {
      opacity: 0.45;
      text-decoration: line-through;
    }
    .filter-save-btn {
      margin-top: 14px;
    }

    /* Category badge colours */
    .cat-soccer     { color: #4ade80; }
    .cat-basketball { color: #fb923c; }
    .cat-tennis     { color: #a78bfa; }
    .cat-esports    { color: #38bdf8; }
    .cat-football   { color: #fbbf24; }
    .cat-baseball   { color: #f87171; }
    .cat-politics   { color: #e879f9; }
    .cat-crypto     { color: #34d399; }
    .cat-other      { color: var(--text-muted); }
  </style>
</head>
<body>

<div class="app-container">

  <!-- Header -->
  <header class="app-header">
    <div class="brand">
      <div class="brand-icon">🐋</div>
      <h1>Whale Analysis</h1>
    </div>
    <div class="header-right">
      <a href="/" class="nav-back">&#8592; Back to Dashboard</a>
    </div>
  </header>

  <!-- ================================================================
       OVERALL WHALE SUMMARY TABLE
       ================================================================ -->
  <section class="card" style="margin-bottom:24px">
    <div class="card-title">
      <span class="dot"></span>
      Whale Performance Summary
      <span class="text-muted" style="font-size:0.72rem;font-weight:400;margin-left:6px">
        (click a row to expand category breakdown and filters)
      </span>
    </div>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Whale</th>
            <th>Followed</th>
            <th>Open</th>
            <th>W / L / N</th>
            <th>Win Rate</th>
            <th>Total P&amp;L</th>
            <th>Avg P&amp;L / Bet</th>
            <th>Best Bet</th>
            <th>Worst Bet</th>
            <th title="Add-to-position signal win rate (resolved signals only)">Signal Win%</th>
            <th title="Hypothetical P&amp;L if all add-to-position signals had been followed">Signal P&amp;L</th>
          </tr>
        </thead>
        <tbody id="whale-analysis-body">
          <tr>
            <td colspan="11">
              <div class="empty-state"><p>Loading whale data...</p></div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </section>

</div><!-- /app-container -->

<!-- Toast container -->
<div id="toast-container" class="toast-container"></div>

<script>
/* ============================================================
   Whale Analysis Page JS
   ============================================================ */

const ALL_SPORTS    = ["Soccer","Basketball","Tennis","eSports","American Football","Baseball","Politics","Crypto","Other"];
const ALL_BET_TYPES = ["Over/Under","Spread","Exact Score","Moneyline","Match Winner","Other"];

function escHtml(s) {
  return String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

const SPORT_CLASS = {
  Soccer: "cat-soccer", Basketball: "cat-basketball", Tennis: "cat-tennis",
  eSports: "cat-esports", "American Football": "cat-football", Baseball: "cat-baseball",
  Politics: "cat-politics", Crypto: "cat-crypto", Other: "cat-other",
};

// ── Utility ───────────────────────────────────────────────────────────────

function fmt(v, prefix = "$") {
  if (v == null) return "—";
  const abs = Math.abs(v).toFixed(2);
  return (v < 0 ? "-" : "+") + prefix + abs;
}

function pnlClass(v) {
  if (v == null) return "";
  return v > 0 ? "text-success" : v < 0 ? "text-danger" : "text-muted";
}

function winRateClass(r) {
  if (r == null) return "";
  return r >= 60 ? "text-success" : r <= 40 ? "text-danger" : "";
}

function showToast(msg, type = "info") {
  const tc = document.getElementById("toast-container");
  const t = document.createElement("div");
  t.className = `toast toast-${type}`;
  t.textContent = msg;
  tc.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

// ── Category breakdown sub-table ──────────────────────────────────────────

function buildBreakdownTable(rows) {
  if (!rows || rows.length === 0) return "<em style='color:var(--text-muted);font-size:0.8rem'>No closed bets</em>";
  let html = `<table class="detail-table">
    <thead><tr>
      <th>Category</th><th>W / L / N</th><th>Win Rate</th><th>Total P&amp;L</th>
    </tr></thead><tbody>`;
  for (const r of rows) {
    const cls = SPORT_CLASS[r.label] || "cat-other";
    html += `<tr>
      <td><span class="${cls}">${r.label}</span></td>
      <td>${r.wins} / ${r.losses} / ${r.neutral}</td>
      <td class="${winRateClass(r.win_rate_pct)}">${r.win_rate_pct != null ? r.win_rate_pct + "%" : "—"}</td>
      <td class="${pnlClass(r.total_pnl_usdc)}">${fmt(r.total_pnl_usdc)}</td>
    </tr>`;
  }
  html += "</tbody></table>";
  return html;
}

// ── Filter chips ──────────────────────────────────────────────────────────

function buildFilterChips(containerId, items, allItems, disabled) {
  const wrap = document.getElementById(containerId);
  wrap.innerHTML = "";
  for (const item of allItems) {
    const isDisabled = disabled.includes(item);
    const chip = document.createElement("label");
    chip.className = "filter-chip" + (isDisabled ? " disabled-chip" : "");
    chip.dataset.value = item;

    const cb = document.createElement("input");
    cb.type = "checkbox";
    cb.checked = !isDisabled;
    cb.addEventListener("change", () => {
      chip.classList.toggle("disabled-chip", !cb.checked);
    });

    chip.appendChild(cb);
    chip.appendChild(document.createTextNode(item));
    wrap.appendChild(chip);
  }
}

function readDisabled(containerId) {
  return Array.from(document.querySelectorAll(`#${containerId} .filter-chip`))
    .filter(c => !c.querySelector("input").checked)
    .map(c => c.dataset.value);
}

function readEnabled(containerId) {
  return Array.from(document.querySelectorAll(`#${containerId} .filter-chip`))
    .filter(c => c.querySelector("input").checked)
    .map(c => c.dataset.value);
}

// ── Detail panel HTML ─────────────────────────────────────────────────────

function buildDetailPanel(whale) {
  const addr = whale.whale_address;
  const safeId = addr.replace(/[^a-z0-9]/gi, "_");
  const filters = whale.category_filters || {};
  const allowedSports    = filters.allowed_sports    || [];
  const isAllowlistMode  = allowedSports.length > 0;

  const fmtPrice = v => (v != null ? v : "");
  const fmtSize  = v => (v != null ? v : "");

  return `
    <div class="whale-detail-panel" id="panel-${safeId}">
      <div class="detail-grid">
        <div>
          <div class="detail-section-title">By Sport / Topic</div>
          ${buildBreakdownTable(whale.by_sport)}
        </div>
        <div>
          <div class="detail-section-title">By Bet Type</div>
          ${buildBreakdownTable(whale.by_bet_type)}
        </div>
      </div>

      <div class="filter-panel" style="margin-bottom:10px">
        <div class="filter-panel-title">&#127919; Bet Sizing Mode</div>
        <label style="display:flex;align-items:center;gap:8px;font-size:0.82rem;cursor:pointer">
          <input type="checkbox" id="arb-mode-${safeId}" ${whale.arb_mode ? 'checked' : ''}
                 onchange="toggleArbMode('${addr}', this)">
          <span>
            <strong>Arb Mode</strong> &mdash; size bets by <em>price extremity</em> instead of whale's conviction.
            Use for arbitrage whales whose bet amount reflects market liquidity, not confidence.
          </span>
        </label>
        <div id="arb-mode-status-${safeId}" style="font-size:0.75rem;color:var(--text-muted);margin-top:4px;margin-left:22px"></div>
      </div>

      <div class="filter-panel" style="margin-bottom:10px">
        <div class="filter-panel-title">&#128200; Add-to-Position Following</div>
        <label style="display:flex;align-items:center;gap:8px;font-size:0.82rem;cursor:pointer">
          <input type="checkbox" id="follow-add-signals-${safeId}" ${whale.follow_add_signals ? 'checked' : ''}
                 onchange="toggleFollowAddSignals('${addr}', this)">
          <span>
            <strong>Follow Add Signals</strong> &mdash; place a bet when this whale adds more capital
            to a position we already hold, sized by <em>suggested_add_usdc</em>.
          </span>
        </label>
        <div id="follow-add-signals-status-${safeId}" style="font-size:0.75rem;color:var(--text-muted);margin-top:4px;margin-left:22px"></div>
      </div>

      <div class="filter-panel" style="margin-bottom:10px">
        <div class="filter-panel-title">&#9881; Category Filters</div>

        <div style="margin-bottom:8px">
          <label style="display:flex;align-items:center;gap:8px;font-size:0.82rem;cursor:pointer">
            <input type="checkbox" id="allowlist-mode-${safeId}" ${isAllowlistMode ? 'checked' : ''}
                   onchange="toggleSportMode('${safeId}', this.checked)">
            <span><strong>Allowlist mode</strong> &mdash; only copy bets from selected sports (ignore the block list)</span>
          </label>
        </div>

        <div id="sport-block-group-${safeId}" style="${isAllowlistMode ? 'display:none' : ''}">
          <div class="filter-group-label">Block sports / topics <span style="font-weight:400;color:var(--text-muted)">(unchecked = skip)</span></div>
          <div class="filter-chips" id="sports-chips-${safeId}"></div>
        </div>

        <div id="sport-allow-group-${safeId}" style="${isAllowlistMode ? '' : 'display:none'}">
          <div class="filter-group-label">Allow only these sports <span style="font-weight:400;color:var(--text-muted)">(checked = copy)</span></div>
          <div class="filter-chips" id="sports-allow-chips-${safeId}"></div>
        </div>

        <div style="margin-top:8px">
          <div class="filter-group-label">Bet Types <span style="font-weight:400;color:var(--text-muted)">(unchecked = skip)</span></div>
          <div class="filter-chips" id="bettypes-chips-${safeId}"></div>
        </div>
      </div>

      <div class="filter-panel" style="margin-bottom:10px">
        <div class="filter-panel-title">&#128178; Whale Trade Thresholds</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:0.82rem">
          <div>
            <div class="filter-group-label">Entry price range (0–1)</div>
            <div style="display:flex;gap:6px;align-items:center">
              <input type="number" id="min-price-${safeId}" min="0" max="1" step="0.01"
                     placeholder="min" value="${fmtPrice(filters.min_entry_price)}"
                     style="width:70px;padding:3px 5px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:4px;color:var(--text-primary)">
              <span style="color:var(--text-muted)">–</span>
              <input type="number" id="max-price-${safeId}" min="0" max="1" step="0.01"
                     placeholder="max" value="${fmtPrice(filters.max_entry_price)}"
                     style="width:70px;padding:3px 5px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:4px;color:var(--text-primary)">
            </div>
          </div>
          <div>
            <div class="filter-group-label">Whale bet size (USDC)</div>
            <div style="display:flex;gap:6px;align-items:center">
              <input type="number" id="min-size-${safeId}" min="0" step="1"
                     placeholder="min $" value="${fmtSize(filters.min_whale_bet_usdc)}"
                     style="width:80px;padding:3px 5px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:4px;color:var(--text-primary)">
              <span style="color:var(--text-muted)">–</span>
              <input type="number" id="max-size-${safeId}" min="0" step="1"
                     placeholder="max $" value="${fmtSize(filters.max_whale_bet_usdc)}"
                     style="width:80px;padding:3px 5px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:4px;color:var(--text-primary)">
            </div>
          </div>
        </div>
      </div>

      <div class="filter-panel" style="margin-bottom:10px">
        <div class="filter-panel-title">&#128269; Keyword Filters <span style="font-size:0.7rem;font-weight:400;color:var(--text-muted);text-transform:none">(comma-separated, case-insensitive)</span></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:0.82rem">
          <div>
            <div class="filter-group-label">Required keywords (ALL must match)</div>
            <input type="text" id="required-kw-${safeId}"
                   placeholder="e.g. tennis, wimbledon"
                   value="${escHtml((filters.required_keywords || []).join(', '))}"
                   style="width:100%;padding:4px 6px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:4px;color:var(--text-primary);box-sizing:border-box">
          </div>
          <div>
            <div class="filter-group-label">Excluded keywords (NONE may match)</div>
            <input type="text" id="excluded-kw-${safeId}"
                   placeholder="e.g. futures, winner"
                   value="${escHtml((filters.excluded_keywords || []).join(', '))}"
                   style="width:100%;padding:4px 6px;background:var(--bg-secondary);border:1px solid var(--border);border-radius:4px;color:var(--text-primary);box-sizing:border-box">
          </div>
        </div>
      </div>

      <div class="filter-save-btn">
        <button class="btn btn-primary btn-sm" onclick="saveFilters('${addr}', '${safeId}')">
          Save Filters
        </button>
        <span id="save-status-${safeId}" style="margin-left:10px;font-size:0.78rem;color:var(--text-muted)"></span>
      </div>
    </div>`;
}

function toggleSportMode(safeId, isAllowlist) {
  document.getElementById(`sport-block-group-${safeId}`).style.display = isAllowlist ? 'none' : '';
  document.getElementById(`sport-allow-group-${safeId}`).style.display = isAllowlist ? '' : 'none';
}

// ── Save filters ──────────────────────────────────────────────────────────

function parseKwField(id) {
  const val = (document.getElementById(id)?.value || "").trim();
  return val ? val.split(",").map(s => s.trim()).filter(Boolean) : [];
}

function parseFloatField(id) {
  const el = document.getElementById(id);
  if (!el || el.value === "") return null;
  const v = parseFloat(el.value);
  return isNaN(v) ? null : v;
}

async function saveFilters(address, safeId) {
  const isAllowlist = document.getElementById(`allowlist-mode-${safeId}`)?.checked;
  const disabledSports   = isAllowlist ? [] : readDisabled(`sports-chips-${safeId}`);
  const allowedSports    = isAllowlist ? readEnabled(`sports-allow-chips-${safeId}`) : [];
  const disabledBetTypes = readDisabled(`bettypes-chips-${safeId}`);
  const statusEl = document.getElementById(`save-status-${safeId}`);
  const payload = {
    disabled_sports:      disabledSports,
    disabled_bet_types:   disabledBetTypes,
    allowed_sports:       allowedSports,
    min_entry_price:      parseFloatField(`min-price-${safeId}`),
    max_entry_price:      parseFloatField(`max-price-${safeId}`),
    min_whale_bet_usdc:   parseFloatField(`min-size-${safeId}`),
    max_whale_bet_usdc:   parseFloatField(`max-size-${safeId}`),
    required_keywords:    parseKwField(`required-kw-${safeId}`),
    excluded_keywords:    parseKwField(`excluded-kw-${safeId}`),
  };
  try {
    const resp = await fetch(`/api/whales/${address}/categories`, {
      method: "PATCH",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });
    if (!resp.ok) throw new Error(await resp.text());
    statusEl.textContent = "✓ Saved";
    statusEl.style.color = "var(--success)";
    showToast("Filters saved", "success");
    setTimeout(() => { statusEl.textContent = ""; }, 3000);
  } catch (e) {
    statusEl.textContent = "✗ Error";
    statusEl.style.color = "var(--danger)";
    showToast("Failed to save filters", "error");
  }
}

// ── Arb mode toggle ───────────────────────────────────────────────────────

async function toggleArbMode(address, checkbox) {
  const safeId = address.replace(/[^a-z0-9]/gi, "_");
  const statusEl = document.getElementById(`arb-mode-status-${safeId}`);
  try {
    const resp = await fetch(`/api/whales/${address}/arb-mode`, { method: "PATCH" });
    if (!resp.ok) throw new Error(await resp.text());
    const data = await resp.json();
    const mode = data.whale.arb_mode ? "Arb Mode ON" : "Arb Mode OFF";
    statusEl.textContent = `✓ ${mode}`;
    statusEl.style.color = "var(--success)";
    showToast(mode, "success");
    setTimeout(() => { statusEl.textContent = ""; }, 3000);
  } catch (e) {
    checkbox.checked = !checkbox.checked;  // revert optimistic update
    statusEl.textContent = "✗ Error";
    statusEl.style.color = "var(--danger)";
    showToast("Failed to toggle arb mode", "error");
  }
}

// ── Follow-add-signals toggle ─────────────────────────────────────────────

async function toggleFollowAddSignals(address, checkbox) {
  const safeId = address.replace(/[^a-z0-9]/gi, "_");
  const statusEl = document.getElementById(`follow-add-signals-status-${safeId}`);
  try {
    const resp = await fetch(`/api/whales/${address}/follow-add-signals`, { method: "PATCH" });
    if (!resp.ok) throw new Error(await resp.text());
    const data = await resp.json();
    const state = data.whale.follow_add_signals ? "Follow Add Signals ON" : "Follow Add Signals OFF";
    statusEl.textContent = `✓ ${state}`;
    statusEl.style.color = "var(--success)";
    showToast(state, "success");
    setTimeout(() => { statusEl.textContent = ""; }, 3000);
  } catch (e) {
    checkbox.checked = !checkbox.checked;
    statusEl.textContent = "✗ Error";
    statusEl.style.color = "var(--danger)";
    showToast("Failed to toggle follow-add-signals", "error");
  }
}

// ── Main summary table ────────────────────────────────────────────────────

let _analysisData = [];

async function fetchWhaleAnalysis() {
  // Fetch all three endpoints in parallel
  const [summaryResp, catResp, whalesResp] = await Promise.all([
    fetch("/api/stats/by-whale"),
    fetch("/api/stats/by-whale-category"),
    fetch("/api/whales"),
  ]);
  const summaryData = await summaryResp.json();
  const catData     = await catResp.json();
  const whalesData  = await whalesResp.json();

  // Index category data by address
  const catByAddr = {};
  for (const w of catData.whales) catByAddr[w.whale_address] = w;

  // Index whale model data (arb_mode, is_active, etc.) by address
  const whaleByAddr = {};
  for (const w of whalesData.whales) whaleByAddr[w.address] = w;

  // Merge — whale model fields take precedence for arb_mode / follow_add_signals
  _analysisData = summaryData.whales.map(w => ({
    ...w,
    ...(catByAddr[w.whale_address] || {}),
    arb_mode: !!(whaleByAddr[w.whale_address] || {}).arb_mode,
    follow_add_signals: !!(whaleByAddr[w.whale_address] || {}).follow_add_signals,
  }));

  renderWhaleAnalysis(_analysisData);
}

function renderWhaleAnalysis(whales) {
  const tbody = document.getElementById("whale-analysis-body");
  if (!whales || whales.length === 0) {
    tbody.innerHTML = `<tr><td colspan="11"><div class="empty-state"><p>No closed bets yet.</p></div></td></tr>`;
    return;
  }

  let html = "";
  for (const w of whales) {
    const alias = w.whale_alias || w.whale_address;
    const short = w.whale_address ? w.whale_address.slice(0, 8) + "…" : "";
    const wrClass = winRateClass(w.win_rate_pct);
    const pnlCls  = pnlClass(w.total_pnl_usdc);
    const safeId  = w.whale_address.replace(/[^a-z0-9]/gi, "_");

    // Summary row
    html += `<tr class="whale-summary-row" onclick="toggleWhaleRow('${safeId}', this)" data-addr="${w.whale_address}">
      <td>
        <span style="font-weight:600">${alias}</span>
        <span class="text-muted mono" style="font-size:0.72rem;margin-left:6px">${short}</span>
      </td>
      <td>${w.followed}</td>
      <td>${w.open}</td>
      <td>${w.wins} / ${w.losses} / ${w.neutral}</td>
      <td class="${wrClass}">${w.win_rate_pct != null ? w.win_rate_pct + "%" : "—"}</td>
      <td class="${pnlCls}">${fmt(w.total_pnl_usdc)}</td>
      <td class="${pnlClass(w.avg_pnl_usdc)}">${fmt(w.avg_pnl_usdc)}</td>
      <td class="text-success">${w.best_bet_usdc != null ? fmt(w.best_bet_usdc) : "—"}</td>
      <td class="text-danger">${w.worst_bet_usdc != null ? fmt(w.worst_bet_usdc) : "—"}</td>
      <td class="${winRateClass(w.signal_win_rate_pct)}">${w.signal_win_rate_pct != null ? w.signal_win_rate_pct + "%" : "—"}</td>
      <td class="${pnlClass(w.signal_total_pnl_usdc)}">${w.signal_total_pnl_usdc != null ? fmt(w.signal_total_pnl_usdc) : "—"}</td>
    </tr>`;

    // Detail row (hidden until expanded)
    html += `<tr class="whale-detail-row" id="detail-row-${safeId}">
      <td colspan="11">${buildDetailPanel(w)}</td>
    </tr>`;
  }
  tbody.innerHTML = html;

  // Initialise filter chips for each whale
  for (const w of whales) {
    const safeId = w.whale_address.replace(/[^a-z0-9]/gi, "_");
    const filters = w.category_filters || {};
    // Block-list chips: checked = enabled (not disabled)
    buildFilterChips(`sports-chips-${safeId}`,       ALL_SPORTS,    ALL_SPORTS,    filters.disabled_sports   || []);
    buildFilterChips(`bettypes-chips-${safeId}`,     ALL_BET_TYPES, ALL_BET_TYPES, filters.disabled_bet_types || []);
    // Allow-list chips: checked = allowed; start all unchecked then check the saved allowlist
    const allowedSports = filters.allowed_sports || [];
    buildFilterChips(`sports-allow-chips-${safeId}`, ALL_SPORTS,    allowedSports, ALL_SPORTS.filter(s => !allowedSports.includes(s)));
  }
}

function toggleWhaleRow(safeId, summaryRow) {
  const detailRow = document.getElementById(`detail-row-${safeId}`);
  const panel     = document.getElementById(`panel-${safeId}`);
  const isOpen    = summaryRow.classList.contains("expanded");

  summaryRow.classList.toggle("expanded", !isOpen);
  detailRow.classList.toggle("open", !isOpen);
  if (panel) panel.style.display = isOpen ? "none" : "block";
}

// ── Boot ──────────────────────────────────────────────────────────────────

fetchWhaleAnalysis();
</script>
</body>
</html>
